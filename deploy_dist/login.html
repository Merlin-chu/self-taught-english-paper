<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 自考英语刷题平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border: 1px solid #ddd;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 8px; color: #000; }
        .subtitle { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: #333; font-weight: 500; }
        input[type="text"],
        input[type="password"] {
            width: 100%; padding: 12px 14px; border: 1px solid #ccc;
            font-size: 0.95rem; transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #333; }
        .btn {
            width: 100%; padding: 14px; background: #333; color: #fff;
            border: none; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s;
        }
        .btn:hover { background: #555; }
        .btn:disabled { background: #999; cursor: not-allowed; }
        .error-msg { color: #b91c1c; font-size: 0.85rem; margin-top: 6px; display: none; }
        .error-msg.show { display: block; }
        .success-msg { color: #2c7d64; font-size: 0.85rem; margin-top: 6px; display: none; }
        .success-msg.show { display: block; }
        .links { text-align: center; margin-top: 24px; font-size: 0.9rem; color: #666; }
        .links a { color: #333; text-decoration: none; font-weight: 500; }
        .links a:hover { text-decoration: underline; }
        .back-link { display: block; text-align: center; margin-top: 16px; color: #666; text-decoration: none; font-size: 0.85rem; }
        .back-link:hover { color: #333; }
        .info-box {
            background: #f0f7ff; border: 1px solid #b3d8ff; padding: 12px 16px;
            margin-bottom: 24px; font-size: 0.82rem; color: #555; line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <h1>登录</h1>
        <p class="subtitle">登录后系统自动保存刷题记录和错题</p>

        <div class="info-box">
            💡 您的账号和刷题数据均保存在<b>当前浏览器</b>中，不会上传到任何服务器。
            换设备或浏览器后需重新注册，之前的记录不会同步。
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required autocomplete="username">
                <div class="error-msg" id="usernameError"></div>
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
                <div class="error-msg" id="passwordError"></div>
            </div>

            <div class="error-msg" id="formError" style="margin-bottom:16px;"></div>

            <button type="submit" class="btn" id="submitBtn">登录</button>
        </form>

        <div class="links">
            还没有账号？<a href="register.html">立即注册</a>
        </div>

        <a href="index.html" class="back-link">← 返回首页</a>
    </div>

    <script src="js/app.js"></script>
    <script>
        // 等待 app.js 加载
        (function waitForApp() {
            if (typeof QuizApp === 'undefined') { setTimeout(waitForApp, 50); return; }

            // 已登录则跳转
            if (QuizApp.User.isLoggedIn()) {
                window.location.href = 'profile.html';
                return;
            }

            const form = document.getElementById('loginForm');
            const submitBtn = document.getElementById('submitBtn');
            const formError = document.getElementById('formError');

            form.addEventListener('submit', function (e) {
                e.preventDefault();

                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;

                formError.classList.remove('show');
                document.getElementById('usernameError').classList.remove('show');
                document.getElementById('passwordError').classList.remove('show');

                if (!username) {
                    document.getElementById('usernameError').textContent = '请输入用户名';
                    document.getElementById('usernameError').classList.add('show');
                    return;
                }
                if (!password) {
                    document.getElementById('passwordError').textContent = '请输入密码';
                    document.getElementById('passwordError').classList.add('show');
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = '登录中...';

                // 模拟一点延迟让用户看到反馈
                setTimeout(function () {
                    const result = QuizApp.User.login(username, password);
                    if (result.success) {
                        window.location.href = 'profile.html';
                    } else {
                        formError.textContent = result.error;
                        formError.classList.add('show');
                        submitBtn.disabled = false;
                        submitBtn.textContent = '登录';
                    }
                }, 200);
            });
        })();
    </script>
</body>
</html>
