<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 自考英语刷题平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #fff; border: 1px solid #ddd;
            padding: 40px; width: 100%; max-width: 400px;
        }
        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 8px; color: #000; }
        .subtitle { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: #333; font-weight: 500; }
        input[type="text"],
        input[type="password"] {
            width: 100%; padding: 12px 14px; border: 1px solid #ccc;
            font-size: 0.95rem; transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #333; }
        .hint { font-size: 0.8rem; color: #888; margin-top: 4px; }
        .btn {
            width: 100%; padding: 14px; background: #333; color: #fff;
            border: none; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s;
        }
        .btn:hover { background: #555; }
        .btn:disabled { background: #999; cursor: not-allowed; }
        .error-msg { color: #b91c1c; font-size: 0.85rem; margin-top: 6px; display: none; }
        .error-msg.show { display: block; }
        .links { text-align: center; margin-top: 24px; font-size: 0.9rem; color: #666; }
        .links a { color: #333; text-decoration: none; font-weight: 500; }
        .links a:hover { text-decoration: underline; }
        .back-link { display: block; text-align: center; margin-top: 16px; color: #666; text-decoration: none; font-size: 0.85rem; }
        .back-link:hover { color: #333; }
        .info-box {
            background: #f0f7ff; border: 1px solid #b3d8ff; padding: 12px 16px;
            margin-bottom: 24px; font-size: 0.82rem; color: #555; line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>注册</h1>
        <p class="subtitle">创建账号，开始刷题之旅</p>

        <div class="info-box">
            💡 您的数据保存在<b>当前浏览器的本地存储</b>中。换设备或浏览器后需要重新注册。
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required autocomplete="username">
                <div class="hint">2-20 个字符</div>
                <div class="error-msg" id="usernameError"></div>
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required autocomplete="new-password">
                <div class="hint">至少 6 个字符</div>
                <div class="error-msg" id="passwordError"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">确认密码</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password">
                <div class="error-msg" id="confirmError"></div>
            </div>

            <div class="error-msg" id="formError" style="margin-bottom:16px;"></div>

            <button type="submit" class="btn" id="submitBtn">注册</button>
        </form>

        <div class="links">
            已有账号？<a href="login.html">立即登录</a>
        </div>

        <a href="index.html" class="back-link">← 返回首页</a>
    </div>

    <script src="js/app.js"></script>
    <script>
        (function waitForApp() {
            if (typeof QuizApp === 'undefined') { setTimeout(waitForApp, 50); return; }

            // 已登录则跳转
            if (QuizApp.User.isLoggedIn()) {
                window.location.href = 'profile.html';
                return;
            }

            const form = document.getElementById('registerForm');
            const submitBtn = document.getElementById('submitBtn');
            const formError = document.getElementById('formError');

            form.addEventListener('submit', function (e) {
                e.preventDefault();

                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                // 清除错误
                formError.classList.remove('show');
                document.getElementById('usernameError').classList.remove('show');
                document.getElementById('passwordError').classList.remove('show');
                document.getElementById('confirmError').classList.remove('show');

                let hasError = false;

                if (username.length < 2 || username.length > 20) {
                    document.getElementById('usernameError').textContent = '用户名长度应为 2-20 个字符';
                    document.getElementById('usernameError').classList.add('show');
                    hasError = true;
                }

                if (password.length < 6) {
                    document.getElementById('passwordError').textContent = '密码长度至少 6 个字符';
                    document.getElementById('passwordError').classList.add('show');
                    hasError = true;
                }

                if (password !== confirmPassword) {
                    document.getElementById('confirmError').textContent = '两次输入的密码不一致';
                    document.getElementById('confirmError').classList.add('show');
                    hasError = true;
                }

                if (hasError) return;

                submitBtn.disabled = true;
                submitBtn.textContent = '注册中...';

                setTimeout(function () {
                    const result = QuizApp.User.register(username, password);
                    if (result.success) {
                        window.location.href = 'profile.html';
                    } else {
                        formError.textContent = result.error;
                        formError.classList.add('show');
                        submitBtn.disabled = false;
                        submitBtn.textContent = '注册';
                    }
                }, 200);
            });
        })();
    </script>
</body>
</html>
